  enabled: true
  output_dir: "outputs/html"

compute_score:
  enabled: true
  num_neighbors: 1
  cores: 2

upload:
  enabled: false # Disable GDrive upload for sample run

log_link:
  sheet_path: "logs/drive_links.json"

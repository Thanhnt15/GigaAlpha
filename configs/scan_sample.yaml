data:
  path: "data/sample_data.pickle"
  segments:
    - ["2022_02_07", "2026_04_01"]
 
backtest:
  alpha_name: "001"
  gen_name: "1_1"
  lst_bar_size: [7.0, 10.0]
  lst_fee: [0.1]
